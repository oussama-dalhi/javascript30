<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>css-javascript-vars</title>
  <link rel="icon" href="https://fav.farm/" />
  <link href="style.css" rel="stylesheet">
  <script src="script.js" defer></script>
</head>
<body>
  <h2>Manipulating Css variables with <span class='highlight'>JS</span></h2>
  <div class="controls">
    <label for="spacing">Spacing</label>
    <input id="spacing" type="range" name="spacing" min="10" max="200" value="0" data-sizing="px">

    <label for="blur">Blur</label>
    <input id="blur" type="range" name="blur" min="0" max="25" value="0" data-sizing="px">

    <label for="base">Base Color</label>
    <input id="base" type="color" name="base" value="">
  </div>
  <img src="https://images.unsplash.com/photo-1518391846015-55a9cc003b25?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fE5ldyUyMFlvcmt8ZW58MHx8MHx8fDA%3D">
</body>
</html>
