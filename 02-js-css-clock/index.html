<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>clock</title>
  <link rel="icon" href="https://fav.farm/" />
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="time">
    <span data-list="hour"></span>
    <span data-list="minute"></span>
    <span data-list="second"></span>
  </div>
    <div class="clock">
      <div class="clock-face">
        <div class="hand hour-hand"></div>
        <div class="hand min-hand"></div>
        <div class="hand second-hand"></div>
      </div>
    </div>
    <div class="greet">
      <p>Built by Oussama Dalhi</p>
    </div>
</body>
</html>
