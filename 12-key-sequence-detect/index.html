<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Key Detection</title>
    <script type="text/javascript" src="./cornify.js" defer></script>
  </head>
  <body>
    <script>
      const pressed = [];
      const secretCode = 'dalhi';
      window.addEventListener('keyup', ((e) => {
        pressed.push(e.key);
        console.log(pressed);
        pressed.splice(-secretCode.length - 1, pressed.length - secretCode.length - 1);
        if(pressed.join('').includes(secretCode))
        {
        alert('You Did It!');
        cornify_add();
        }
      }));
      
    </script>
  </body>
</html>
